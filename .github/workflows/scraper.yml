name: Email Scraper Automation

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'create_email'
        type: choice
        options:
          - create_email
          - check_otp
          - cancel_workflow

jobs:
  scrape-email:
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'cancel_workflow'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: Run Scraper
        id: scraper
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GITHUB_EVENT_INPUTS_ACTION: ${{ github.event.inputs.action }}
        run: |
          python scraper.py > result.json 2>&1 || true
          cat result.json
          echo "result=$(cat result.json)" >> $GITHUB_OUTPUT
      
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-results
          path: |
            result.json
            debug_screenshot.png
          retention-days: 1
      
      - name: Save to Firebase
        if: success()
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          python -c "
          import json, os, sys
          try:
              from firebase_admin import credentials, initialize_app, db
              
              with open('result.json') as f:
                  data = json.load(f)
              
              if data.get('status') == 'active':
                  cred_info = json.loads(os.getenv('FIREBASE_TOKEN'))
                  if not initialize_app._apps:
                      cred = credentials.Certificate(cred_info)
                      initialize_app(cred, {'databaseURL': os.getenv('FIREBASE_URL')})
                  
                  ref = db.reference('/emails')
                  ref.push(data)
                  print('✅ Saved to Firebase!')
              else:
                  print('No active email to save')
          except Exception as e:
              print(f'Firebase error: {e}')
              sys.exit(0)  # Don't fail the workflow
          "

  cancel-workflow:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'cancel_workflow'
    
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
      
      - name: Mark Cancelled in Firebase
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          python -c "
          import json, os
          try:
              from firebase_admin import credentials, initialize_app, db
              cred_info = json.loads(os.getenv('FIREBASE_TOKEN'))
              if not initialize_app._apps:
                  cred = credentials.Certificate(cred_info)
                  initialize_app(cred, {'databaseURL': os.getenv('FIREBASE_URL')})
              
              ref = db.reference('/emails')
              last = ref.order_by_key().limit_to_last(1).get()
              if last:
                  key = list(last.keys())[0]
                  ref.child(key).update({'status': 'cancelled'})
                  print('Marked as cancelled')
          except Exception as e:
              print(f'Error: {e}')
          "
