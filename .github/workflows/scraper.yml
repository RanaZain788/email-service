name: Email Scraper Automation

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'create_email'
        type: choice
        options:
          - create_email
          - check_otp
          - cancel_workflow

jobs:
  scrape-email:
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'cancel_workflow'
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Chrome & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable unzip
          google-chrome --version
      
      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run Scraper with Proxies
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GITHUB_EVENT_INPUTS_ACTION: ${{ github.event.inputs.action }}
          # 🔥 PROXIES YAHAN CONFIGURE KAR
          PROXIES: ${{ secrets.PROXIES }}
          # Ya individual proxies:
          # HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          # HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          # SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
        run: |
          python scraper.py > result.json 2>&1 || true
          cat result.json
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-results
          path: |
            result.json
            debug_screenshot.png
            proxy_auth_plugin.zip
          retention-days: 1
      
      - name: Save to Firebase
        if: success()
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          python -c "
          import json, os
          try:
              from firebase_admin import credentials, initialize_app, db
              with open('result.json') as f:
                  data = json.load(f)
              if data.get('status') == 'active':
                  cred_info = json.loads(os.getenv('FIREBASE_TOKEN'))
                  if not initialize_app._apps:
                      cred = credentials.Certificate(cred_info)
                      initialize_app(cred, {'databaseURL': os.getenv('FIREBASE_URL')})
                  db.reference('/emails').push(data)
                  print('Saved to Firebase!')
          except Exception as e:
              print(f'Error: {e}')
          "

  cancel-workflow:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'cancel_workflow'
    
    steps:
      - uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}
